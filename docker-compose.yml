services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: activia
      POSTGRES_PASSWORD: activia
      POSTGRES_DB: activia_trace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activia -d activia_trace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:delegated

  worker:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    command: ["python", "-m", "app.workers.main"]
    volumes:
      - ./backend:/app:delegated

  test:
    build:
      context: ./backend
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app:delegated
    profiles:
      - test

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

volumes:
  pgdata:
